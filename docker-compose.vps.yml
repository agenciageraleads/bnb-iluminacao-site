version: '3.8'

services:
  bnb-site:
    build: .
    image: bnb-platform-bnb-site:latest
    container_name: bnb_site
    restart: always
    ports:
      - "9010:9010"
    labels:
      # Traefik — roteamento automático via domínio
      - "traefik.enable=true"
      - "traefik.http.routers.bnb.rule=Host(`bebiluminacao.com.br`) || Host(`www.bebiluminacao.com.br`)"
      - "traefik.http.routers.bnb.entrypoints=websecure"
      - "traefik.http.routers.bnb.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.bnb.loadbalancer.server.port=9010"
      # Redirect www → sem www
      - "traefik.http.middlewares.bnb-redir.redirectregex.regex=^https?://www.bebiluminacao.com.br/(.*)"
      - "traefik.http.middlewares.bnb-redir.redirectregex.replacement=https://bebiluminacao.com.br/$${1}"
      - "traefik.http.middlewares.bnb-redir.redirectregex.permanent=true"
      - "traefik.http.routers.bnb.middlewares=bnb-redir"
    environment:
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-bnb_user}:${POSTGRES_PASSWORD:-bnb_password_secure_123}@postgres:5432/${POSTGRES_DB:-bnb_database}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bnb_user}:${POSTGRES_PASSWORD:-bnb_password_secure_123}@postgres:5432/${POSTGRES_DB:-bnb_database}
    depends_on:
      - postgres
      - redis
    volumes:
      - media_data:/app/media
    networks:
      - default
      - portaleletricos

  postgres:
    image: postgres:15-alpine
    container_name: bnb_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bnb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bnb_password_secure_123}
      POSTGRES_DB: ${POSTGRES_DB:-bnb_database}
    ports:
      - "9001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bnb_redis
    restart: always
    ports:
      - "9002:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  media_data:

# Rede externa do Traefik (já existe na VPS)
networks:
  portaleletricos:
    external: true

